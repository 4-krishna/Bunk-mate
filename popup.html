<!DOCTYPE html>
<html>
<head>
    <title>Bunk Mate</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --background-color: #F5F5F7;
            --text-color: #1D1D1F;
            --border-color: #D2D2D7;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            background-color: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 20px;
            text-align: center;
            color: var(--primary-color);
        }

        .github-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: var(--primary-color);
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .github-link:hover {
            opacity: 1;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #86868B;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .percentage {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-color);
            margin: 8px 0;
        }

        .status {
            font-size: 14px;
            margin-top: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            white-space: pre-line;
            line-height: 1.5;
        }

        .status.good {
            background-color: #E8F5E9;
            color: #2E7D32;
        }

        .status.warning {
            background-color: #FFF3E0;
            color: #E65100;
            font-weight: 500;
        }

        .status.danger {
            background-color: #FFEBEE;
            color: #C62828;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bunk Mate</h1>
        <div class="input-group">
            <label for="totalClasses">Total Classes</label>
            <input type="number" id="totalClasses" min="1" placeholder="Enter total number of classes">
        </div>
        <div class="input-group">
            <label for="attendedClasses">Classes Attended</label>
            <input type="number" id="attendedClasses" min="0" placeholder="Enter classes attended">
        </div>
        <button id="calculate">Calculate</button>
        <div class="result" id="result" style="display: none;">
            <div class="percentage" id="percentage">0%</div>
            <div class="status" id="status"></div>
        </div>
    </div>
    <a href="https://github.com/4-krishna" target="_blank" class="github-link">View on GitHub</a>
    <script src="popup.js"></script>
</body>
</html>
